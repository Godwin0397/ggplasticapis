stages:
  - build
  - test

create_file:
  tags:
    -my-runner
  image: alpine
  stage: build
  script:
    - echo "Building Run ..."
    - mkdir build
    - touch build/somefile.txt
  artifacts:
    paths:
     - build/

test_file:
  tags:
    -my-runner
  image: alpine
  stage: test
  script:
    - test -f build/somefile.txt