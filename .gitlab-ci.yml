stages:
  - build
  - deploy

variables:
  SSH_USER: ubuntu

build:
  stage: build
  image: node:18
  script:
    - npm install
    - npm run build
  artifacts:
    name: "$CI_COMMIT_REF_NAME-dist"
    paths:
      - dist/
    expire_in: 1 hour

# ================= DEV DEPLOY =================
deploy-dev:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build

  before_script:
    - apk add --no-cache openssh rsync
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SSH_HOST_DEV >> ~/.ssh/known_hosts

  script:
  - echo "🚀 Deploying to Dev server..."

  # Copy files
  - rsync -avz --delete ./ $SSH_USER@$SSH_HOST_DEV:$APP_DIR_DEV

  # Create .env
  - >
    ssh $SSH_USER@$SSH_HOST_DEV "
    echo mongodb_url=$mongodb_url > $APP_DIR_DEV/.env &&
    echo port=$port >> $APP_DIR_DEV/.env &&
    echo JWT_SECRET=$JWT_SECRET >> $APP_DIR_DEV/.env &&
    echo AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID >> $APP_DIR_DEV/.env &&
    echo AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY >> $APP_DIR_DEV/.env &&
    echo AWS_REGION=$AWS_REGION >> $APP_DIR_DEV/.env &&
    echo AWS_Bucket_Name01=$AWS_Bucket_Name01 >> $APP_DIR_DEV/.env &&
    echo AWS_Bucket_Name02=$AWS_Bucket_Name02 >> $APP_DIR_DEV/.env &&
    echo localhost_backend_server_3001=$localhost_backend_server_3001 >> $APP_DIR_DEV/.env &&
    echo localhost_frontend_server_5173=$localhost_frontend_server_5173 >> $APP_DIR_DEV/.env &&
    echo localhost_frontend_server_5174=$localhost_frontend_server_5174 >> $APP_DIR_DEV/.env &&
    echo localhost_frontend_server_5175=$localhost_frontend_server_5175 >> $APP_DIR_DEV/.env &&
    echo publicIP=$publicIP >> $APP_DIR_DEV/.env &&
    echo elasticIp=$elasticIp >> $APP_DIR_DEV/.env &&
    echo production_frontend_website=$production_frontend_website >> $APP_DIR_DEV/.env &&
    echo production_backend=$production_backend >> $APP_DIR_DEV/.env &&
    echo production_port=$production_port >> $APP_DIR_DEV/.env &&
    echo uat_backend=$uat_backend >> $APP_DIR_DEV/.env &&
    echo uat_port=$uat_port >> $APP_DIR_DEV/.env &&
    echo dev_backend=$dev_backend >> $APP_DIR_DEV/.env
    "

  # 🔥 Install dependencies
  - >
    ssh $SSH_USER@$SSH_HOST_DEV "
    cd $APP_DIR_DEV &&
    npm install --production
    "

  # Restart PM2
  - >
    ssh $SSH_USER@$SSH_HOST_DEV "
    cd $APP_DIR_DEV &&
    pm2 delete ggplastic-dev || true &&
    pm2 start dist/server.js --name ggplastic-dev &&
    pm2 save
    "

  only:
    - main

# ================= UAT DEPLOY =================
deploy-uat:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build

  before_script:
    - apk add --no-cache openssh rsync
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SSH_HOST_DEV >> ~/.ssh/known_hosts

  script:
    - echo "🚀 Deploying to UAT server..."

    # Copy files to UAT folder
    - rsync -avz --delete ./ $SSH_USER@$SSH_HOST_DEV:/var/www/ggplastic-uat

    # Create .env for UAT
    - >
      ssh $SSH_USER@$SSH_HOST_DEV "
      echo mongodb_url=$mongodb_url > /var/www/ggplastic-uat/.env &&
      echo port=$uat_port >> /var/www/ggplastic-uat/.env &&
      echo JWT_SECRET=$JWT_SECRET >> /var/www/ggplastic-uat/.env &&
      echo AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID >> /var/www/ggplastic-uat/.env &&
      echo AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY >> /var/www/ggplastic-uat/.env &&
      echo AWS_REGION=$AWS_REGION >> /var/www/ggplastic-uat/.env &&
      echo AWS_Bucket_Name01=$AWS_Bucket_Name01 >> /var/www/ggplastic-uat/.env &&
      echo AWS_Bucket_Name02=$AWS_Bucket_Name02 >> /var/www/ggplastic-uat/.env &&
      echo publicIP=$publicIP >> /var/www/ggplastic-uat/.env &&
      echo elasticIp=$elasticIp >> /var/www/ggplastic-uat/.env &&
      echo uat_backend=$uat_backend >> /var/www/ggplastic-uat/.env &&
      echo uat_port=$uat_port >> /var/www/ggplastic-uat/.env
      "

    # Restart PM2 (UAT)
    - >
      ssh $SSH_USER@$SSH_HOST_DEV "
      cd /var/www/ggplastic-uat &&
      pm2 restart ggplastic-uat || pm2 start dist/server.js --name ggplastic-uat &&
      pm2 save
      "

  only:
    - uat

