stages:
  - build
  - deploy

variables:
  SSH_USER: ubuntu

build:
  stage: build
  image: node:18
  script:
    - npm install
    - npm run build
  artifacts:
    paths:
      - build/
    expire_in: 1 hour

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh rsync
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H $SSH_HOST_DEV >> ~/.ssh/known_hosts
  script:
    - echo "Deploying main branch to Dev server..."
    - rsync -avz --delete build/ $SSH_USER@$SSH_HOST_DEV:$APP_DIR_DEV
  only:
    - main