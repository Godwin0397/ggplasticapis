stages:
  - build
  - deploy

variables:
  SSH_USER: ubuntu

# ================= BUILD =================
build:
  stage: build
  image: node:18
  script:
    - npm install
    - npm run build
  artifacts:
    name: "$CI_COMMIT_REF_NAME-dist"
    paths:
      - dist/
    expire_in: 1 hour

# ================= DEV DEPLOY =================
deploy:
  stage: deploy
  image: alpine:latest
  dependencies:
    - build

  before_script:
    - apk add --no-cache openssh rsync bash
    - mkdir -p ~/.ssh
    - echo "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - "echo DEV HOST: $SSH_HOST_DEV"
    - ssh-keyscan -H $SSH_HOST_DEV >> ~/.ssh/known_hosts || true

  script:
    - echo "🚀 Deploying to Dev server..."

    # Test SSH
    - ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST_DEV "echo Connected"

    # Copy files
    - rsync -avz --delete ./ $SSH_USER@$SSH_HOST_DEV:$APP_DIR_DEV

    # Install dependencies
    - ssh $SSH_USER@$SSH_HOST_DEV "cd $APP_DIR_DEV && npm install --production"

    # Create .env
    - ssh $SSH_USER@$SSH_HOST_DEV "echo mongodb_url=$mongodb_url > $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo port=$port >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo JWT_SECRET=$JWT_SECRET >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo AWS_REGION=$AWS_REGION >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo AWS_Bucket_Name01=$AWS_Bucket_Name01 >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo AWS_Bucket_Name02=$AWS_Bucket_Name02 >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo dev_backend=$dev_backend >> $APP_DIR_DEV/.env"
    - ssh $SSH_USER@$SSH_HOST_DEV "echo dev_frontend_website=$dev_frontend_website >> $APP_DIR_DEV/.env"

    # Restart PM2
    - ssh $SSH_USER@$SSH_HOST_DEV "cd $APP_DIR_DEV && pm2 delete ggplastic-dev || true"
    - ssh $SSH_USER@$SSH_HOST_DEV "cd $APP_DIR_DEV && pm2 start dist/server.js --name ggplastic-dev"
    - ssh $SSH_USER@$SSH_HOST_DEV "pm2 save"

  only:
    - main